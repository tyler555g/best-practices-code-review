name: Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install RTK
        run: npm install -g rtk
      - name: Install dependencies
        run: rtk npm ci
      - name: Run tests
        run: rtk test node --test tests/*.test.js
      - name: Audit dependencies
        run: rtk npm audit --audit-level=moderate
